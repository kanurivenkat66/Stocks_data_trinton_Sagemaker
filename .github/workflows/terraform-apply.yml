name: Terraform Apply (Main)

on:
  push:
    branches:
      - main
    paths:
      - 'fraud-detection-system/infrastructure/**'
      - '.github/workflows/terraform-apply.yml'

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: "1.5.0"
  AWS_REGION: "us-west-2"

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: fraud-detection-system/infrastructure
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      
      - name: Repair State Digest
        run: |
          BUCKET="fraud-detection-terraform-state-889526028446"
          KEY="fraud-detection/terraform.tfstate"
          LOCK_ID="${BUCKET}/${KEY}-md5"
          # Delete the stale digest entry. Terraform will re-create it after a
          # successful state read. Writing back the wrong ETag (e.g. from an
          # empty S3 object) would only move the mismatch; deletion is safe.
          aws dynamodb delete-item \
            --table-name terraform-locks \
            --region ${{ env.AWS_REGION }} \
            --key "{\"LockID\":{\"S\":\"${LOCK_ID}\"}}" \
            2>/dev/null || true
          echo "Stale state digest cleared."
          # Warn if the state file itself is empty or missing
          SIZE=$(aws s3api head-object --bucket "$BUCKET" --key "$KEY" \
            --query ContentLength --output text 2>/dev/null || echo "0")
          if [ "$SIZE" = "0" ] || [ "$SIZE" = "None" ] || [ -z "$SIZE" ]; then
            echo "WARNING: S3 state file is empty or missing (size=$SIZE)."
            echo "If infrastructure already exists, restore from S3 versioning before applying."
          else
            echo "S3 state file OK (${SIZE} bytes)."
          fi

      - name: Terraform Init
        id: init
        run: terraform init -input=false
      
      - name: Terraform Validate
        id: validate
        run: terraform validate
      
      - name: Import Existing CloudWatch Log Groups
        run: |
          # Log groups may already exist in AWS from a previous deployment.
          # Import them into state so Terraform doesn't try to re-create them.
          import_if_missing() {
            local ADDR="$1"
            local ID="$2"
            if ! terraform state show "$ADDR" >/dev/null 2>&1; then
              echo "Importing $ADDR ($ID)..."
              terraform import -input=false "$ADDR" "$ID" 2>&1 || echo "  (already managed or not found — continuing)"
            else
              echo "$ADDR already in state — skipping."
            fi
          }
          import_if_missing "module.vpc.aws_cloudwatch_log_group.vpc_flow_logs[0]" "/aws/vpc/flow-logs/fraud-detection"
          import_if_missing "module.eks.aws_cloudwatch_log_group.eks[0]"          "/aws/eks/fraud-detection-cluster/cluster"

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
      
      - name: Show Plan Summary
        run: terraform show -json tfplan | jq '.' > plan.json
      
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: fraud-detection-system/infrastructure/
          retention-days: 30
      
      - name: Verify Plan
        id: verify
        run: |
          RESOURCE_COUNT=$(jq '.resource_changes | length' plan.json)
          echo "resource_count=$RESOURCE_COUNT" >> $GITHUB_OUTPUT
          echo "Planning to create/modify $RESOURCE_COUNT resources"
      
      - name: Terraform Apply
        id: apply
        run: terraform apply -input=false tfplan
        continue-on-error: true
      
      - name: Get Outputs
        id: outputs
        run: |
          echo "cluster_name=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "data_bucket=$(terraform output -raw data_bucket_name)" >> $GITHUB_OUTPUT
          echo "models_bucket=$(terraform output -raw models_bucket_name)" >> $GITHUB_OUTPUT
      
      - name: Exit on Apply Failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
