name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm full infrastructure teardown'
        required: true
        type: string
      empty_s3_buckets:
        description: 'Empty S3 buckets before destroy (required if buckets contain data)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      drain_eks_nodes:
        description: 'Drain EKS nodes before destroying cluster'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: "1.5.0"
  AWS_REGION: "us-west-2"
  TERRAFORM_DIR: fraud-detection-system/infrastructure

jobs:
  # ─── Gate 1: Validate confirmation input before doing anything ───────────────
  confirm:
    name: Validate Destroy Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
            echo "❌ Confirmation failed. You must type 'destroy' exactly to proceed."
            echo "   Got: '${{ github.event.inputs.confirm_destroy }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted. Proceeding with destroy pipeline."

  # ─── Gate 2: Plan what will be destroyed (audit trail) ───────────────────────
  destroy-plan:
    name: Plan Destroy (Audit)
    runs-on: ubuntu-latest
    needs: confirm
    environment: production        # Requires GitHub environment approval
    outputs:
      resource_count: ${{ steps.count.outputs.resource_count }}
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      data_bucket: ${{ steps.outputs.outputs.data_bucket }}
      models_bucket: ${{ steps.outputs.outputs.models_bucket }}

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Bootstrap Terraform Backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fraud-detection-terraform-state-${ACCOUNT_ID}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi
          if ! aws dynamodb describe-table --table-name terraform-locks --region ${{ env.AWS_REGION }} 2>/dev/null; then
            aws dynamodb create-table \
              --table-name terraform-locks \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists \
              --table-name terraform-locks \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy Plan
        id: plan
        run: |
          terraform plan -destroy -no-color -input=false -lock=false -out=destroy.tfplan 2>&1 | tee destroy-plan.txt

      - name: Count resources to destroy
        id: count
        run: |
          RESOURCE_COUNT=$(grep -c "  # " destroy-plan.txt || true)
          echo "resource_count=$RESOURCE_COUNT" >> $GITHUB_OUTPUT
          echo "⚠️  Resources that will be DESTROYED: $RESOURCE_COUNT"

      - name: Capture current outputs (for post-destroy verification)
        id: outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name 2>/dev/null || echo 'not-deployed')" >> $GITHUB_OUTPUT
          echo "data_bucket=$(terraform output -raw data_bucket 2>/dev/null || echo 'not-deployed')" >> $GITHUB_OUTPUT
          echo "models_bucket=$(terraform output -raw models_bucket 2>/dev/null || echo 'not-deployed')" >> $GITHUB_OUTPUT

      - name: Print destroy summary
        run: |
          echo "============================================================"
          echo "  DESTROY PLAN SUMMARY"
          echo "============================================================"
          echo "  Triggered by : ${{ github.actor }}"
          echo "  Commit       : ${{ github.sha }}"
          echo "  Cluster      : ${{ steps.outputs.outputs.cluster_name }}"
          echo "  Data bucket  : ${{ steps.outputs.outputs.data_bucket }}"
          echo "  Models bucket: ${{ steps.outputs.outputs.models_bucket }}"
          echo "  Resources    : ${{ steps.count.outputs.resource_count }} to destroy"
          echo "============================================================"
          cat destroy-plan.txt

      - name: Upload destroy plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.sha }}
          path: |
            ${{ env.TERRAFORM_DIR }}/destroy.tfplan
            ${{ env.TERRAFORM_DIR }}/destroy-plan.txt
          retention-days: 90

  # ─── Pre-destroy: Drain EKS / empty S3 if requested ─────────────────────────
  pre-destroy:
    name: Pre-Destroy Cleanup
    runs-on: ubuntu-latest
    needs: destroy-plan

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        if: github.event.inputs.drain_eks_nodes == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Drain EKS nodes
        if: >
          github.event.inputs.drain_eks_nodes == 'true' &&
          needs.destroy-plan.outputs.cluster_name != 'not-deployed'
        run: |
          CLUSTER="${{ needs.destroy-plan.outputs.cluster_name }}"
          echo "Configuring kubectl for cluster: $CLUSTER"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$CLUSTER" 2>/dev/null || {
            echo "⚠️  Could not configure kubectl — cluster may already be gone. Continuing."
            exit 0
          }

          echo "Draining all nodes..."
          NODES=$(kubectl get nodes -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")
          if [ -z "$NODES" ]; then
            echo "No nodes found — skipping drain."
          else
            for NODE in $NODES; do
              echo "  Draining node: $NODE"
              kubectl drain "$NODE" \
                --ignore-daemonsets \
                --delete-emptydir-data \
                --force \
                --timeout=120s \
                --grace-period=30 || echo "  ⚠️  Drain warning on $NODE (continuing)"
            done
            echo "✅ All nodes drained."
          fi

      - name: Empty S3 buckets
        if: github.event.inputs.empty_s3_buckets == 'true'
        run: |
          empty_bucket() {
            local BUCKET="$1"
            if [ -z "$BUCKET" ] || [ "$BUCKET" = "not-deployed" ]; then
              return 0
            fi
            if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "  Bucket $BUCKET does not exist — skipping."
              return 0
            fi
            echo "  Emptying s3://$BUCKET ..."
            # Delete all versioned objects and delete markers
            aws s3api list-object-versions --bucket "$BUCKET" \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              --output json 2>/dev/null | \
              jq -c 'select(.Objects != null and (.Objects | length) > 0)' | \
              xargs -I{} aws s3api delete-objects --bucket "$BUCKET" --delete '{}' || true
            # Delete all delete markers
            aws s3api list-object-versions --bucket "$BUCKET" \
              --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
              --output json 2>/dev/null | \
              jq -c 'select(.Objects != null and (.Objects | length) > 0)' | \
              xargs -I{} aws s3api delete-objects --bucket "$BUCKET" --delete '{}' || true
            # Final sweep for non-versioned objects
            aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
            echo "  ✅ s3://$BUCKET emptied."
          }

          empty_bucket "${{ needs.destroy-plan.outputs.data_bucket }}"
          empty_bucket "${{ needs.destroy-plan.outputs.models_bucket }}"

          # Also attempt to empty buckets by known naming pattern
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          for SUFFIX in data models training-artifacts logs; do
            BUCKET="fraud-detection-${SUFFIX}-${ACCOUNT_ID}"
            empty_bucket "$BUCKET"
          done

  # ─── Destroy ─────────────────────────────────────────────────────────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs:
      - destroy-plan
      - pre-destroy

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Bootstrap Terraform Backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fraud-detection-terraform-state-${ACCOUNT_ID}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "State bucket not found — nothing to destroy."
            exit 0
          fi
          if ! aws dynamodb describe-table --table-name terraform-locks --region ${{ env.AWS_REGION }} 2>/dev/null; then
            aws dynamodb create-table \
              --table-name terraform-locks \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists \
              --table-name terraform-locks \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        id: destroy
        run: |
          terraform destroy \
            -auto-approve \
            -no-color \
            -input=false \
            2>&1 | tee destroy.txt
        continue-on-error: true

      - name: Upload destroy log
        uses: actions/upload-artifact@v4
        with:
          name: destroy-log-${{ github.sha }}
          path: ${{ env.TERRAFORM_DIR }}/destroy.txt
          retention-days: 90

      - name: Fail if destroy failed
        if: steps.destroy.outcome == 'failure'
        run: |
          echo "❌ terraform destroy reported failures. Review destroy.txt artifact."
          exit 1

  # ─── Post-destroy: Verify key resources are gone ─────────────────────────────
  post-destroy-verify:
    name: Post-Destroy Verification
    runs-on: ubuntu-latest
    needs:
      - destroy-plan
      - destroy
    if: always() && needs.destroy.result != 'skipped'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify EKS cluster removed
        run: |
          CLUSTER="${{ needs.destroy-plan.outputs.cluster_name }}"
          if [ "$CLUSTER" = "not-deployed" ]; then
            echo "ℹ️  No cluster was tracked — skipping."
            exit 0
          fi
          if aws eks describe-cluster --name "$CLUSTER" --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "⚠️  WARNING: EKS cluster '$CLUSTER' still exists."
          else
            echo "✅ EKS cluster '$CLUSTER' confirmed destroyed."
          fi

      - name: Verify S3 buckets removed
        run: |
          check_bucket() {
            local BUCKET="$1"
            if [ -z "$BUCKET" ] || [ "$BUCKET" = "not-deployed" ]; then return 0; fi
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "⚠️  WARNING: Bucket '$BUCKET' still exists (may contain data that blocked deletion)."
            else
              echo "✅ Bucket '$BUCKET' confirmed destroyed."
            fi
          }
          check_bucket "${{ needs.destroy-plan.outputs.data_bucket }}"
          check_bucket "${{ needs.destroy-plan.outputs.models_bucket }}"

      - name: Print destroy report
        run: |
          echo "============================================================"
          echo "  DESTROY COMPLETE"
          echo "============================================================"
          echo "  Triggered by : ${{ github.actor }}"
          echo "  Timestamp    : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "  Commit       : ${{ github.sha }}"
          echo "  Destroy job  : ${{ needs.destroy.result }}"
          echo "============================================================"

      - name: Notify success
        if: needs.destroy.result == 'success'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Infrastructure Destroyed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Fraud Detection infrastructure destroyed successfully*\n*Actor*: ${{ github.actor }}\n*Cluster*: ${{ needs.destroy-plan.outputs.cluster_name }}\n*Commit*: ${{ github.sha }}"
                  }
                }
              ]
            }
        continue-on-error: true

      - name: Notify failure
        if: needs.destroy.result == 'failure'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Terraform Destroy FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Fraud Detection infrastructure destroy FAILED*\n*Actor*: ${{ github.actor }}\n*Commit*: ${{ github.sha }}\n*Check the destroy-log artifact for details.*"
                  }
                }
              ]
            }
        continue-on-error: true
